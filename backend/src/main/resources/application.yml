server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/school_security}
    username: ${DB_USER:school}
    password: ${DB_PASSWORD:school}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-123456}
  outbox:
    topic: ${OUTBOX_TOPIC:school.security.event.v1}
    relay-delay-ms: ${OUTBOX_RELAY_DELAY_MS:2000}
